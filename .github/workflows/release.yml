name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Node dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        run: npm run tauri build

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          # Rename files with version
          mv "msi/Claude Fleet_${{ steps.version.outputs.version }}_x64_en-US.msi" "msi/claude-fleet-${{ steps.version.outputs.version }}-x64.msi" || true
          mv "nsis/Claude Fleet_${{ steps.version.outputs.version }}_x64-setup.exe" "nsis/claude-fleet-${{ steps.version.outputs.version }}-x64-setup.exe" || true

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: release/

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: nsis-installer
          path: release/

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Claude Fleet ${{ steps.version.outputs.tag }}
          body: |
            ## Claude Fleet ${{ steps.version.outputs.tag }}

            ### 下载
            - **Windows MSI**: `claude-fleet-${{ steps.version.outputs.version }}-x64.msi`
            - **Windows NSIS**: `claude-fleet-${{ steps.version.outputs.version }}-x64-setup.exe`

            ### 安装说明
            1. 下载对应的安装包
            2. 运行安装程序
            3. 启动 Claude Fleet

            ### 更新日志
            请查看 [commits](https://github.com/Melod-YI/claude-fleet/commits/${{ steps.version.outputs.tag }}) 了解详细变更。
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}